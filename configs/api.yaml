clients:
  yandex_gpt:
    base_url: "https://llm.api.cloud.yandex.net/foundationModels/v1"
    timeout: 60s  # Добавить 's'
    headers:
      Authorization: "Bearer ${YANDEX_API_KEY}"
    retry_count: 3
    retry_wait_time: 1s  # Добавить 's'
    max_retry_wait_time: 30s  # Добавить 's'
    enable_logging: true
  
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    timeout: 60s  # Добавить 's'
    headers:
      Authorization: "Bearer ${OPENROUTER_API_KEY}"
      Content-Type: "application/json"
      HTTP-Referer: "https://telegram-bot.example.com"
      X-Title: "Telegram Task Assistant"
    retry_count: 3
    retry_wait_time: 1s  # Добавить 's'
    max_retry_wait_time: 30s  # Добавить 's'
    enable_logging: true

  todoist:
    base_url: "https://api.todoist.com/rest/v2"
    timeout: 30s  # ИЗМЕНИТЬ: было "30", стало "30s"
    headers:
      Authorization: "Bearer ${TODOIST_API_TOKEN}"
    retry_count: 3
    retry_wait_time: 1s  # Добавить 's'
    max_retry_wait_time: 30s  # Добавить 's'
    enable_logging: true