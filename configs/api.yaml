clients:
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    timeout: 60s
    headers:
      Authorization: "Bearer ${OPENROUTER_API_KEY}"
      Content-Type: "application/json"
      HTTP-Referer: "https://telegram-bot.example.com"
      X-Title: "Telegram Task Assistant"
    retry_count: 3
    retry_wait_time: 1s
    max_retry_wait_time: 30s
    enable_logging: true

  todoist:
    base_url: "https://api.todoist.com/api/v1"
    timeout: 30s
    authorization:
      type: "Bearer"
      token_env_var: "TODOIST_API_TOKEN"
    retry_count: 3
    retry_wait_time: 1s
    max_retry_wait_time: 30s
    enable_logging: true