services:
  postgres:
    image: postgres:14
    container_name: jiraf-postgres
    environment:
      POSTGRES_USER: jiraf_user
      POSTGRES_PASSWORD: jiraf_password
      POSTGRES_DB: jiraf_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./internal/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jiraf_user -d jiraf_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jiraf_network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-bot
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TODOIST_API_TOKEN=${TODOIST_API_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - AI_PROVIDER=${AI_PROVIDER:-openrouter}
      - DATABASE_URL=postgres://jiraf_user:jiraf_password@postgres:5432/jiraf_db?sslmode=disable
    volumes:
      - ./configs:/app/configs
      - ./internal/db:/app/internal/db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jiraf_network
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  postgres_data:

networks:
  jiraf_network:
    driver: bridge